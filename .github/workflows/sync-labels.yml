name: Sync Labels

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Sync labels
        uses: peter-evans/create-or-update-labels@v2
        with:
          repository: ${{ github.repository }}
          file: .github/labels.yml
          token: ${{ secrets.GITHUB_TOKEN }}
